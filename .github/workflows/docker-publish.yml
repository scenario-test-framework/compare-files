name: Docker Build and Publish

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check generated docs are up to date
        run: python3 .claude/skills/compare-layout/scripts/generate_docs.py --check

  build:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=sha

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # リリースタグ時は VERSION (semver) を ldflags に注入して再ビルドする。
  # --version がリリースバージョンを表示するようにするため、master ビルドの
  # SHA イメージの再タグ付けではなくタグ時点のソースからビルドし直す (#16)。
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # タグ push では test ジョブがスキップされるため、通常 CI と同じ検証を再実行する
      - name: Run tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check generated docs are up to date
        run: python3 .claude/skills/compare-layout/scripts/generate_docs.py --check

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # プレリリース (2.1.0-rc.1 等) では latest / major / minor を更新せず、
      # 完全一致タグのみ push する
      - name: Extract version from tag
        id: version
        run: |
          # Strip 'v' prefix if present
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # semver.org の公式パターン (build metadata を除く。+ は Docker タグに使えないため対象外)
          NUM='0|[1-9][0-9]*'
          IDENT="${NUM}|[0-9]*[A-Za-z-][0-9A-Za-z-]*"
          SEMVER="^(${NUM})\\.(${NUM})\\.(${NUM})(-(${IDENT})(\\.(${IDENT}))*)?\$"
          if ! printf '%s' "${VERSION}" | grep -Eq "${SEMVER}"; then
            echo "::error::Tag ${TAG} is not a semver (X.Y.Z or X.Y.Z-prerelease)"
            exit 1
          fi

          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          MAJOR=$(echo "${VERSION}" | cut -d. -f1)
          MINOR=$(echo "${VERSION}" | cut -d. -f2)

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<TAGS_EOF"
            echo "${IMAGE}:${VERSION}"
            case "${VERSION}" in
              *-*)
                echo "Prerelease detected: only the exact version tag is pushed" >&2
                ;;
              *)
                echo "${IMAGE}:latest"
                echo "${IMAGE}:${MAJOR}.${MINOR}"
                echo "${IMAGE}:${MAJOR}"
                ;;
            esac
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Parsed version: ${VERSION} (major=${MAJOR}, minor=${MAJOR}.${MINOR})"

      # OCI ラベルは metadata-action で生成する (タグの決定は上の手書きロジック)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.version.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
